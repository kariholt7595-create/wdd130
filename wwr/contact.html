<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Water Rafting Contact Us</title>
    <meta name="description"
      content="Contact White Water Rafting for reservations, trip details, and answers to your questions ">
    <meta name="author" content="Karissa Holt">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header class="header-grid">
        <img src="images/z-wwr-oars.png" alt="White Water Rafting logo splash and 2 oars"
          width="100">
        <nav>
            <ul class="flex">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>White Water Rafting Company</h1>
        <h2>123 Main River Street</h2>
        <h2>Glenwood Springs, Colorado</h2>
        <h2>+1 999 999 9999</h2>
        <h2>info@whitewater.com</h2>
        <div class="div-grid">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d58540.53288424869!2d-107.33179721363226!3d39.54477382010152!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1775245133427!5m2!1sen!2sus"
                  width="400" height="380" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form class="contact-form">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="John Smith">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="info@email.com">

                <label class="top-align">Message Purpose</label>
                <div class="radio-group">
                    <label><input type="radio" id="general" name="purpose" value="general">General
                        Inquiry</label>
                    <label><input type="radio" id="reservation" name="purpose"
                          value="reservation">Reservation
                        Request</label>
                    <label><input type="radio" id="suggestion" name="purpose"
                          value="suggestion">Website
                        Suggestion</label>
                </div>
                <div class="message-area">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="4"></textarea>
                </div>
                <div></div>
                <label class="checkbox-line full-row"><input type="checkbox" id="newsletter"
                      name="newsletter">Please
                    Subscribe
                    me
                    to the monthly newsletter</label>
                <div></div>
                <button type="submit" class="full-row">Get in Touch!</button>
            </form>
        </div>
        <section class="section3-grid">
            <h2>We are Here to Serve You</h2>
            <figure>
                <img src="images/raft-guide.jpg" alt="Raft Guide of White Water Rafting Company">
                <figcaption>Remi Lund "Raft Guide"</figcaption>
            </figure>
            <figure>
                <img src="images/owner.jpg" alt="Owner of White Water Rafting Company">
                <figcaption>Conner Philips "Owner"</figcaption>
            </figure>
            <figure>
                <img src="images/onsite-manager.jpg"
                  alt="Onsite Manager of White Water Rafting Company">
                <figcaption>Kenji Yamada "Onsite Manager"</figcaption>
            </figure>
        </section>
    </main>
    <footer class="footer-grid">
        <p>© 2026 | White Water Rafting | Karissa Holt</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook-square.svg" height=50 alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-square.svg" height=50 alt="Linkedin Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram-square.svg" height=50 alt="Instagram Icon">
            </a>
        </nav>
    </footer>

</body>

</html>
